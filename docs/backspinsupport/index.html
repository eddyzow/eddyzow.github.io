<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0D0F1E" />
  <title>Backspin Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0A0C1B;
      --sfc:     #111326;
      --card:    #181A30;
      --card2:   #1E2138;
      --border:  rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.10);
      --green:   #2EE89C;
      --green-d: rgba(46,232,156,0.11);
      --gold:    #F5A623;
      --red:     #FF6B6B;
      --text:    #C8CBDE;
      --muted:   #525572;
      --white:   #F4F6FF;
      --r:       16px;
      --r-sm:    10px;
      --r-xs:    8px;
    }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
    }

    /* ── App shell ─────────────────────────────────────────── */
    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    /* ── Header ────────────────────────────────────────────── */
    #hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      padding-top: env(safe-area-inset-top);
      height: calc(58px + env(safe-area-inset-top));
      background: rgba(10,12,27,0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      flex-shrink: 0;
      z-index: 10;
    }

    .hdr-av {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(145deg, #122218, #091610);
      border: 2px solid var(--green);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(46,232,156,0.3);
    }

    .hdr-info { flex: 1; min-width: 0; }
    .hdr-name {
      font-size: 14.5px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }
    .hdr-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.online  { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .status-dot.offline { background: var(--gold);  box-shadow: 0 0 5px var(--gold);  animation: blink 1.4s ease-in-out infinite; }
    .status-dot.error   { background: var(--red);   box-shadow: 0 0 5px var(--red);   }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    .status-text { color: var(--muted); }
    .status-text.online { color: var(--green); }

    /* Language selector */
    .lang-sel {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
    }
    .lang-btn {
      padding: 5px 8px;
      border-radius: 7px;
      background: none;
      border: 1.5px solid transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s ease;
    }
    .lang-btn:active { transform: scale(0.9); }
    .lang-btn.active {
      border-color: rgba(46,232,156,0.3);
      color: var(--green);
      background: var(--green-d);
    }

    /* ── Feed ──────────────────────────────────────────────── */
    #feed {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      scrollbar-width: none;
      padding: 14px 13px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    #feed::-webkit-scrollbar { display: none; }

    .date-div {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      margin: 6px 0 10px;
      letter-spacing: 0.05em;
    }

    /* ── Message rows ──────────────────────────────────────── */
    .row {
      display: flex;
      align-items: flex-end;
      gap: 7px;
      animation: msg-in 0.2s cubic-bezier(0.25,0.46,0.45,0.94) both;
      margin-bottom: 2px;
    }
    .row.bot  { justify-content: flex-start; }
    .row.user { justify-content: flex-end; }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(7px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .row-av {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: linear-gradient(145deg, #122218, #091610);
      border: 1.5px solid rgba(46,232,156,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      align-self: flex-end;
    }
    .row-av.hidden { visibility: hidden; }

    /* ── Bubbles ───────────────────────────────────────────── */
    .bubble {
      max-width: 84%;
      padding: 11px 14px;
      line-height: 1.6;
      font-size: 15.5px;
      word-break: break-word;
    }
    .row.bot .bubble {
      background: var(--card);
      color: var(--text);
      border-radius: 16px 16px 16px 4px;
      border: 1px solid var(--border);
    }
    .row.bot .bubble b, .row.bot .bubble strong { color: var(--white); }
    .row.user .bubble {
      background: var(--green);
      color: #081510;
      border-radius: 16px 16px 4px 16px;
      font-weight: 600;
      font-size: 15px;
    }

    /* Answer content inside bot bubble */
    .ans-inner { display: flex; flex-direction: column; gap: 9px; }

    .cat-pill {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
      padding: 3px 9px; border-radius: 20px;
    }

    .ans-q { font-weight: 700; font-size: 16.5px; color: var(--white); line-height: 1.3; }

    .ans-steps { display: flex; flex-direction: column; gap: 8px; }
    .step-row { display: flex; align-items: flex-start; gap: 9px; }
    .step-num {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--green-d); border: 1.5px solid rgba(46,232,156,0.25);
      color: var(--green); font-size: 10.5px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }
    .step-text { font-size: 15px; color: var(--text); line-height: 1.5; padding-top: 2px; }
    .step-text b { color: var(--white); }

    .ans-bullets { display: flex; flex-direction: column; gap: 7px; }
    .bul-row { display: flex; align-items: flex-start; gap: 8px; }
    .bul-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
      margin-top: 7px; opacity: 0.6;
    }
    .bul-text { font-size: 15px; color: var(--text); line-height: 1.5; }
    .bul-text b { color: var(--white); }

    .info-box {
      background: rgba(46,232,156,0.07);
      border: 1px solid rgba(46,232,156,0.15);
      border-radius: 7px; padding: 9px 11px;
      font-size: 13px; color: rgba(46,232,156,0.8); line-height: 1.5;
    }
    .warn-box {
      background: rgba(245,166,35,0.07);
      border: 1px solid rgba(245,166,35,0.18);
      border-radius: 7px; padding: 9px 11px;
      font-size: 13px; color: rgba(245,166,35,0.9); line-height: 1.5;
    }
    .ans-link {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 11px 14px;
      background: var(--green); color: #081510;
      font-size: 13.5px; font-weight: 700;
      border-radius: 8px; text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s;
    }
    .ans-link:active { transform: scale(0.97); }

    /* ── Typing indicator ─────────────────────────────────── */
    .typing-row { animation: msg-in 0.2s ease both; }
    .typing-bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px 16px 16px 4px;
      padding: 12px 14px;
      display: flex; gap: 5px; align-items: center;
    }
    .typing-bubble span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted);
      animation: tbounce 1.2s ease-in-out infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.17s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.34s; }
    @keyframes tbounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.35; }
      30%           { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Chips ─────────────────────────────────────────────── */
    .chips-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 5px 0 9px 33px;
      animation: msg-in 0.22s ease both;
    }

    .chip {
      display: flex; align-items: center; gap: 6px;
      padding: 11px 16px;
      background: var(--card);
      border: 1.5px solid var(--border2);
      border-radius: 22px;
      font-family: inherit;
      font-size: 15px; font-weight: 600;
      color: var(--text);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s ease, background 0.12s ease;
      user-select: none;
      min-height: 44px;
    }
    .chip:active { transform: scale(0.93); }
    .chip.green  { border-color: rgba(46,232,156,0.28); color: var(--green); background: var(--green-d); }
    .chip.gold   { border-color: rgba(245,166,35,0.28); color: var(--gold); background: rgba(245,166,35,0.07); }
    .chip.white  { border-color: rgba(255,255,255,0.13); color: var(--white); }
    .chip.red    { border-color: rgba(255,107,107,0.3); color: var(--red); background: rgba(255,107,107,0.08); }
    .chip.disabled { opacity: 0.3; pointer-events: none; }

    /* Category chips (bigger) */
    .chip.cat { padding: 13px 17px; border-radius: var(--r); font-size: 15.5px; }

    /* ── Escalation card ──────────────────────────────────── */
    .esc-card {
      margin: 3px 0 3px 33px;
      background: rgba(245,166,35,0.06);
      border: 1.5px solid rgba(245,166,35,0.2);
      border-radius: var(--r);
      padding: 14px;
      animation: msg-in 0.22s ease both;
    }
    .esc-head { font-size: 13.5px; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
    .esc-sub  { font-size: 13px; color: rgba(245,166,35,0.65); line-height: 1.5; margin-bottom: 11px; }
    .esc-btns { display: flex; flex-direction: column; gap: 7px; }
    .ebtn {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 12px; border-radius: 9px;
      font-size: 14px; font-weight: 700;
      cursor: pointer; border: none; font-family: inherit; text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s;
    }
    .ebtn:active { transform: scale(0.97); }
    .ebtn-p { background: var(--gold); color: #1a0e00; }
    .ebtn-s { background: rgba(245,166,35,0.1); color: var(--gold); border: 1.5px solid rgba(245,166,35,0.25); }
    .esc-hrs { margin-top: 7px; font-size: 11px; color: var(--muted); text-align: center; }

    /* ── Transfer card ────────────────────────────────────── */
    .transfer-card {
      margin: 3px 0 3px 33px;
      background: rgba(46,232,156,0.06);
      border: 1.5px solid rgba(46,232,156,0.18);
      border-radius: var(--r);
      padding: 16px;
      animation: msg-in 0.22s ease both;
      text-align: center;
    }
    .transfer-icon { font-size: 28px; margin-bottom: 8px; }
    .transfer-title { font-size: 15px; font-weight: 700; color: var(--green); margin-bottom: 5px; }
    .transfer-sub { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .transfer-ticket {
      margin-top: 11px;
      background: var(--card);
      border-radius: 8px; padding: 9px 12px;
      font-size: 12px; color: var(--text);
    }
    .transfer-ticket b { color: var(--white); font-family: monospace; font-size: 13.5px; letter-spacing: 0.1em; }

    /* ── Error bubble ─────────────────────────────────────── */
    .err-row {
      margin: 3px 0 3px 33px;
      animation: msg-in 0.2s ease both;
    }
    .err-bubble {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(255,107,107,0.08);
      border: 1px solid rgba(255,107,107,0.2);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px; color: rgba(255,107,107,0.85); line-height: 1.45;
    }

    /* ── Input bar ────────────────────────────────────────── */
    #input-wrap {
      position: relative;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: rgba(10,12,27,0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    #input-bar {
      display: none;
      align-items: flex-end;
      gap: 9px;
      padding: 10px 13px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }
    #input-bar.visible { display: flex; }

    #msg-input {
      flex: 1;
      background: var(--card);
      border: 1.5px solid var(--border2);
      border-radius: 20px;
      color: var(--white);
      font-family: inherit;
      font-size: 16px;
      line-height: 1.4;
      padding: 9px 14px;
      outline: none;
      resize: none;
      min-height: 40px;
      max-height: 108px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      transition: border-color 0.18s;
    }
    #msg-input:focus { border-color: rgba(46,232,156,0.35); }
    #msg-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--green);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s, opacity 0.12s;
    }
    #send-btn:active { transform: scale(0.88); }
    #send-btn:disabled { opacity: 0.3; cursor: default; }

    #char-count {
      position: absolute;
      right: 62px;
      bottom: max(15px, calc(env(safe-area-inset-bottom) + 15px));
      font-size: 10.5px;
      color: var(--muted);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #char-count.visible { opacity: 1; }
    #char-count.warn { color: var(--gold); }
    #char-count.over { color: var(--red); }

    /* ── Spacer ───────────────────────────────────────────── */
    .msg-sep { height: 7px; flex-shrink: 0; }

    /* ── Keyframes ────────────────────────────────────────── */
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }
    @keyframes rpulse {
      0%,100% { transform: scale(1); opacity: 0.35; }
      50%      { transform: scale(1.07); opacity: 0.85; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes popin {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    /* ── Greeting hero avatar ─────────────────────────────── */
    .greeting-hero {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 0 8px 0;
    }
    .gh-av-wrap { position: relative; width: 46px; height: 46px; flex-shrink: 0; }
    .gh-ring {
      position: absolute; inset: -4px;
      border-radius: 50%;
      border: 1.5px solid rgba(46,232,156,0.3);
      animation: rpulse 2.8s ease-in-out infinite;
    }
    .gh-av {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: linear-gradient(145deg, #122218, #091610);
      border: 2px solid var(--green);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 18px rgba(46,232,156,0.22);
      animation: float 3.5s ease-in-out infinite;
    }
    .gh-text { flex: 1; }
    .gh-text .bot-name { font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 2px; }
    .gh-bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      padding: 10px 13px;
      font-size: 14.5px; color: var(--text); line-height: 1.55;
    }
    .gh-bubble b { color: var(--white); }

    /* Quick section label */
    .sec-lbl {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 2px 0;
      margin-left: 33px;
    }

    /* AI language tag */
    .ai-lang-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 8px;
    }

    /* Ticket update confirmation bar */
    .ticket-update-confirm {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--green);
      background: var(--green-d);
      border: 1px solid rgba(46,232,156,0.18);
      border-radius: var(--r-xs);
      padding: 6px 12px;
      margin: 4px 0;
      letter-spacing: 0.2px;
    }

    /* ── Conversations Inbox Screen ──────────────────────────────── */
    #inbox-screen {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    #inbox-screen.hidden { display: none; }
    #chat-screen.hidden { display: none !important; }

    .inbox-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      scrollbar-width: none;
      padding: 14px 13px 90px;
    }
    .inbox-scroll::-webkit-scrollbar { display: none; }

    .inbox-hero {
      text-align: center;
      padding: 22px 0 18px;
    }
    .inbox-hero-av {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(145deg, #122218, #091610);
      border: 2px solid var(--green);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin: 0 auto 11px;
      box-shadow: 0 0 20px rgba(46,232,156,0.2);
    }
    .inbox-hero-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 4px;
    }
    .inbox-hero-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .inbox-section-lbl {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 16px 0 8px;
    }

    .convo-card {
      background: var(--card);
      border: 1.5px solid var(--border2);
      border-radius: var(--r);
      padding: 14px 16px;
      margin-bottom: 9px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s ease, border-color 0.12s ease;
    }
    .convo-card:active { transform: scale(0.98); }
    .convo-card.open {
      border-color: rgba(46,232,156,0.3);
      background: rgba(46,232,156,0.04);
    }
    .convo-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .convo-card-id {
      font-size: 12px;
      font-weight: 700;
      font-family: monospace;
      letter-spacing: 0.07em;
      color: var(--green);
    }
    .convo-card-date {
      font-size: 11px;
      color: var(--muted);
    }
    .convo-card-subject {
      font-size: 14.5px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .convo-card-preview {
      font-size: 12.5px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .convo-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10.5px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 7px;
    }
    .convo-badge.open { background: var(--green-d); color: var(--green); border: 1px solid rgba(46,232,156,0.25); }
    .convo-badge.closed { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }

    .inbox-new-btn {
      position: fixed;
      bottom: max(22px, calc(env(safe-area-inset-bottom) + 16px));
      left: 50%;
      transform: translateX(-50%);

// ─────────────────────────────────────────────────────────────────
// SOCKET.IO  +  FETCH FALLBACK
// ─────────────────────────────────────────────────────────────────
let sockReady = false;
let pendingAI = false;
let activeTyping = null;
let aiTimeout = null;
let sessionId = 'ws-' + Math.random().toString(36).slice(2, 10);

const _devMode = window.location.port === '5500' || window.location.port === '5501';
const _serverUrl = "https://eddyzow.herokuapp.com";
const sock = _serverUrl
  ? io(_serverUrl, { transports: ['websocket', 'polling'], reconnectionAttempts: 5 })
  : null;

function updateConnStatus(state) {
  const dot  = document.getElementById('status-dot');
  const txt  = document.getElementById('status-text');
  if (!dot || !txt) return;
  dot.className  = 'status-dot ' + state;
  txt.className  = 'status-text ' + state;
  txt.textContent = state === 'online'  ? t('online')
                  : state === 'offline' ? t('reconnecting')
                  : t('connecting');
}

if (sock) {
  sock.on('connect',      () => { sockReady = true;  updateConnStatus('online'); });
  sock.on('disconnect',   () => { sockReady = false; updateConnStatus('offline'); });
  sock.on('connect_error',() => { sockReady = false; updateConnStatus('error'); });

  sock.on('support:chat:response', result => {
    if (aiTimeout) { clearTimeout(aiTimeout); aiTimeout = null; }
    pendingAI = false;
    removeTyping();
    handleAIResponse(result);
  });
} else {
  updateConnStatus('online'); // no socket, will use HTTP
}

async function callAI(text) {
  const historySlice = conversationHistory.slice(-10).slice(0, -1);
  const payload = { message: text, history: historySlice, sessionId, userLang: lang };

  if (sock && sockReady) {
    sock.emit('support:chat', payload);
    // Safety net: if response never comes back, recover after 15s
    aiTimeout = setTimeout(() => {
      if (pendingAI) {
        pendingAI = false;
        removeTyping();
        showErrBubble(t('aiError'));
        unlockInput();
        inputLocked = false;
      }
    }, 15000);
  } else {
    // HTTP fallback — use absolute server URL so it works from Live Server too
    try {
      const res = await fetch(`${_serverUrl}/api/support/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, conversationHistory: historySlice, sessionId, userLang: lang })
      });
      const result = await res.json();
      pendingAI = false;
      removeTyping();
      handleAIResponse(result);
    } catch (err) {
      pendingAI = false;
      removeTyping();
      showErrBubble(t('aiError'));
      unlockInput();
      inputLocked = false;
    }
  }
}

const feed = document.getElementById('feed');
const inputBar  = document.getElementById('input-bar');
const msgInput  = document.getElementById('msg-input');
const sendBtn   = document.getElementById('send-btn');
const charCount = document.getElementById('char-count');

function scrollBottom() { requestAnimationFrame(() => feed.scrollTo({ top: feed.scrollHeight, behavior: 'smooth' })); }

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function botBubble(html, showAv = true, i18nKey = null, extraData = null) {
  const row = document.createElement('div');
  row.className = 'row bot';
  const i18nAttr = i18nKey ? ` data-i18n="${i18nKey}"` : '';
  let extraAttrs = '';
  if (extraData) {
    for (const [k, v] of Object.entries(extraData)) {
      extraAttrs += ` data-${k}="${v}"`;
    }
  }
  row.innerHTML = `<div class="row-av${showAv ? '' : ' hidden'}">🎯</div><div class="bubble"${i18nAttr}${extraAttrs}>${html}</div>`;
  feed.appendChild(row);
  scrollBottom();
  return row;
}

function userBubble(text) {
  const row = document.createElement('div');
  row.className = 'row user';
  row.innerHTML = `<div class="bubble">${esc(text)}</div>`;
  feed.appendChild(row);
  scrollBottom();
  return row;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'row bot typing-row';
  row.innerHTML = `<div class="row-av">🎯</div><div class="typing-bubble"><span></span><span></span><span></span></div>`;
  feed.appendChild(row);
  scrollBottom();
  activeTyping = row;
  return row;
}

function removeTyping() {
  if (activeTyping && activeTyping.parentNode === feed) feed.removeChild(activeTyping);
  activeTyping = null;
}

function showErrBubble(msg) {
  const w = document.createElement('div');
  w.className = 'err-row';
  w.innerHTML = `<div class="err-bubble">⚡ ${esc(msg)}</div>`;
  feed.appendChild(w);
  scrollBottom();
}

function chipsRow(items) {
  const wrap = document.createElement('div');
  wrap.className = 'chips-wrap';
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (item.cls ? ' ' + item.cls : '');
    if (item.i18nKey) {
      btn.dataset.i18nKey = item.i18nKey;
      if (item.emoji) btn.dataset.i18nEmoji = item.emoji;
    }
    btn.innerHTML = item.emoji ? `<span>${item.emoji}</span>${esc(item.label)}` : esc(item.label);
    if (item.data) {
      Object.assign(btn.dataset, item.data);
      // If this chip has a qkey, also set data-qkey for language switcher retranslation
      if (item.data.qkey) btn.dataset.qkey = item.data.qkey;
    }
    btn.addEventListener('click', () => handleChip(btn, wrap));
    wrap.appendChild(btn);
  });
  feed.appendChild(wrap);
  scrollBottom();
  return wrap;
}

function disableChips(wrap) {
  wrap.querySelectorAll('.chip').forEach(b => b.classList.add('disabled'));
}

function showInputBar() {
  inputBar.classList.add('visible');
  setTimeout(() => { msgInput.placeholder = t('placeholder'); msgInput.focus(); }, 80);
}
function hideInputBar() { inputBar.classList.remove('visible'); msgInput.blur(); }
function lockInput()    { sendBtn.disabled = true; msgInput.disabled = true; }
function unlockInput()  { msgInput.disabled = false; validateInput(); }
function validateInput(){ sendBtn.disabled = (msgInput.value.trim().length === 0 || msgInput.value.length > MAX_LEN); }

function renderAns(catId, q) {
  const cat = C[catId];
  const ov = (ANS[lang] || {})[catId + '_' + q.id] || {};
  const f  = (field) => ov[field] !== undefined ? ov[field] : q[field];
  let h = `<div class="ans-inner">`;
  h += `<div class="cat-pill" style="background:${cat.bg};color:${cat.color}">${cat.icon} ${t('cat_' + catId)}</div>`;
  h += `<div class="ans-q">${t(q.qKey)}</div>`;
  if (f('intro')) h += `<div>${f('intro')}</div>`;
  if (f('body'))  h += `<div>${f('body')}</div>`;
  const steps = f('steps');
  if (steps?.length) {
    h += '<div class="ans-steps">';
    steps.forEach((s,i) => { h += `<div class="step-row"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`; });
    h += '</div>';
  }
  const bullets = f('bullets');
  if (bullets?.length) {
    h += '<div class="ans-bullets">';
    bullets.forEach(b => { h += `<div class="bul-row"><div class="bul-dot"></div><div class="bul-text">${b}</div></div>`; });
    h += '</div>';
  }
  if (f('note')) h += `<div class="info-box">${f('note')}</div>`;
  if (f('warn')) h += `<div class="warn-box">${f('warn')}</div>`;
  if (q.link) h += `<a class="ans-link" href="${q.link.url}" target="_blank" rel="noopener">${q.link.label}</a>`;
  h += '</div>';
  return h;
}

async function handleUserMessage(text) {
  if (inputLocked || pendingAI) return;
  inputLocked = true;
  userBubble(text);
  chatLog.push({ role: 'user', text });

  // If waiting for a Match ID, collect it then show error sub-chips
  if (pendingMatchId) {
    pendingMatchId = false;
    const catId = pendingMatchCat;
    pendingMatchCat = null;
    chatLog.push({ role: 'user', text: 'Match ID: ' + text });
    await delay(300);
    showTyping(); await delay(600); removeTyping();
    botBubble(`Got it! Match ID <b>${esc(text)}</b>. Now, what type of issue did you experience?`);
    chipsRow([
      { label: t('errorCrash'),       cls: 'white', i18nKey: 'errorCrash',       data: { action:'pick-q', cat:catId, q:'crash' } },
      { label: t('errorFreeze'),      cls: 'white', i18nKey: 'errorFreeze',      data: { action:'pick-q', cat:catId, q:'froze' } },
      { label: t('errorWrongResult'), cls: 'white', i18nKey: 'errorWrongResult', data: { action:'pick-q', cat:catId, q:'wrongresult' } },
      { label: t('errorOther'),       cls: 'gold',  i18nKey: 'errorOther',       data: { action:'go-ai' } },
    ]);
    unlockInput();
    inputLocked = false;
    return;
  }

  // If a ticket is open, append this message to the ticket thread
  if (activeTicketId) {
    ticketMessages.push(text);
    lockInput();
    await delay(400);
    // Show confirmation that message was added to ticket
    const confirmRow = document.createElement('div');
    confirmRow.className = 'ticket-update-confirm';
    confirmRow.textContent = t('addedToTicket') + ' · ' + activeTicketId;
    feed.appendChild(confirmRow);
    scrollBottom();
    // Save & notify Discord
    saveConversation(activeTicketId, conversations.find(c => c.id === activeTicketId)?.subject || 'Support Request', ticketMessages, 'open');
    sendDiscordWebhook(activeTicketId, 'update', [text]);
    await delay(600);
    showTyping(); await delay(700); removeTyping();
    botBubble(t('ticketUpdated'), true, 'ticketUpdated');
    unlockInput();
    inputLocked = false;
    return;
  }

  pendingAI = true;
  lockInput();
  conversationHistory.push({ role: 'user', content: text });
  showTyping();
  await callAI(text);
}

function handleAIResponse(rawResult) {
  // Defensive parse — socket.io may deliver as string in edge cases
  let result = rawResult;
  if (typeof rawResult === 'string') {
    try { result = JSON.parse(rawResult); } catch(_) {}
  }
  let reply = (result && typeof result.response === 'string') ? result.response : t('aiError');
  const safeReply = reply.replace(/\n/g, '<br>');
  botBubble(`${safeReply}<div class="ai-lang-tag">🤖 ${t('generatedIn')} ${t('aiLang')}</div>`);
  chatLog.push({ role: 'bot', text: reply });
  conversationHistory.push({ role: 'assistant', content: reply });

  // Never auto-escalate — let the user decide to open a ticket themselves
  setTimeout(() => {
    askHelpful('ai');
    unlockInput();
    inputLocked = false;
  }, 350);
}

  card.className = 'transfer-card';
  card.innerHTML = `
    <div class="transfer-icon">🎫</div>
    <div class="transfer-title" data-i18n-title="ticketOpenedTitle">${t('ticketOpenedTitle')}</div>
    <div class="transfer-sub" data-i18n-sub="ticketOpenedSub">${t('ticketOpenedSub')}</div>
    <div class="transfer-ticket" data-i18n-ticket="ticketId">${t('ticketId')}: <b>${activeTicketId}</b></div>`;
  feed.appendChild(card);
  scrollBottom();

  await delay(400);
  botBubble(t('addMoreInfo'), true, 'addMoreInfo');
  // Make sure input is visible so user can add more info
  enterStage2();
}

// ─────────────────────────────────────────────────────────────────
// RESTART / DONE
// ─────────────────────────────────────────────────────────────────
async function handleRestart(btn, wrap) {
  disableChips(wrap);
  stage = 1; noCount = 0; conversationHistory = []; chatLog = [];
  activeTicketId = null; ticketMessages = [];
  pendingMatchId = false; pendingMatchCat = null;
  userBubble(t('backTopics'));
  await delay(200);
  showTyping(); await delay(500); removeTyping();
  botBubble(t('whatElse'), true, 'whatElse');
  hideInputBar();
  showHomeChips();
}

async function handleDone(btn, wrap) {
  disableChips(wrap);
  userBubble(t('thatIsAll'));
  await delay(200);
  showTyping(); await delay(600); removeTyping();
  botBubble(t('doneFarewell'), true, 'doneFarewell');
  hideInputBar();
  await delay(500);
  // Show restart option
  chipsRow([
    { label: t('newConversation'), cls: 'green', i18nKey: 'newConversation', data: { action:'new-conversation' } }
  ]);
}

// ─────────────────────────────────────────────────────────────────
// CHIP DISPATCHER
// ─────────────────────────────────────────────────────────────────
function handleChip(btn, wrap) {
  const a   = btn.dataset.action;
  const cat = btn.dataset.cat;
  const q   = btn.dataset.q;
  if (a === 'pick-cat')        handlePickCat(btn, wrap, cat);
  else if (a === 'pick-q')     handlePickQ(btn, wrap, cat, q);
  else if (a === 'go-ai')      handleGoAi(btn, wrap);
  else if (a === 'helpful-yes')     handleHelpfulYes(btn, wrap);
  else if (a === 'helpful-no-faq')  handleHelpfulNoFaq(btn, wrap);
  else if (a === 'helpful-no-ai')   handleHelpfulNoAi(btn, wrap);
  else if (a === 'transfer-yes')    handleTransferYes(btn, wrap);
  else if (a === 'transfer-no')     handleTransferNo(btn, wrap);
  else if (a === 'restart')    handleRestart(btn, wrap);
  else if (a === 'done')       handleDone(btn, wrap);
  else if (a === 'new-conversation') handleNewConversation(btn, wrap);
}

async function handleNewConversation(btn, wrap) {
  disableChips(wrap);
  stage = 1; noCount = 0; conversationHistory = []; chatLog = [];
  activeTicketId = null; ticketMessages = [];
  pendingMatchId = false; pendingMatchCat = null;
  feed.innerHTML = '';
  hideInputBar();
  loadConversations();
  showInbox();
}

async function handleGoAi(btn, wrap) {
  disableChips(wrap);
  userBubble('💬 ' + t('somethingElse'));
  chatLog.push({ role: 'user', text: t('somethingElse') });
  await delay(200);
  showTyping(); await delay(750); removeTyping();
  botBubble(t('aiFirst'), true, 'aiFirst');
  enterStage2();
}

// ─────────────────────────────────────────────────────────────────
// INPUT BAR EVENTS
// ─────────────────────────────────────────────────────────────────
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 108) + 'px';
  const len = msgInput.value.length;
  if (len > 400) {
    charCount.textContent = `${len}/${MAX_LEN}`;
    charCount.className = len > MAX_LEN ? 'over visible' : 'warn visible';
  } else {
    charCount.className = '';
  }
  validateInput();
});

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    doSend();
  }
});

sendBtn.addEventListener('click', doSend);

function doSend() {
  const text = msgInput.value.trim();
  if (!text || text.length > MAX_LEN || inputLocked || pendingAI) return;
  msgInput.value = '';
  msgInput.style.height = 'auto';
  charCount.className = '';
  sendBtn.disabled = true;
  // Disable the most recent active chip row only when a message is actually sent
  const allWraps = feed.querySelectorAll('.chips-wrap');
  for (let i = allWraps.length - 1; i >= 0; i--) {
    const w = allWraps[i];
    if (w.querySelector('.chip:not(.disabled)')) { disableChips(w); break; }
  }
  handleUserMessage(text);
}

// ─────────────────────────────────────────────────────────────────
// LANGUAGE SWITCHER
// ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const newLang = btn.dataset.lang;
    if (newLang === lang) return;
    lang = newLang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));

    // ── Static header ──────────────────────────────────────────
    const hdrName = document.getElementById('hdr-name');
    if (hdrName) hdrName.textContent = t('botName');
    msgInput.placeholder = t('placeholder');
    updateConnStatus(sockReady ? 'online' : 'offline');

    // ── Greeting bubble ────────────────────────────────────────
    const gBubble = document.getElementById('g-bubble');
    if (gBubble) gBubble.innerHTML = `${t('greeting')}<br><span style="color:var(--muted);font-size:13.5px">${t('greetSub')}</span>`;
    const gName = document.getElementById('g-name');
    if (gName) gName.textContent = t('botName');

    // ── Chips with data-i18n-key ───────────────────────────────
    feed.querySelectorAll('.chip[data-i18n-key]').forEach(c => {
      const key = c.dataset.i18nKey;
      const emoji = c.dataset.i18nEmoji;
      c.innerHTML = emoji ? `<span>${emoji}</span>${esc(t(key))}` : esc(t(key));
    });

    // ── Category chips with data-i18n-cat ─────────────────────
    feed.querySelectorAll('.chip[data-i18n-cat]').forEach(c => {
      const catKey = c.dataset.i18nCat;
      const cat = C[catKey];
      if (!cat) return;
      c.innerHTML = `<span>${cat.icon}</span>${esc(t('cat_' + catKey))}`;
    });

    // ── Bot bubbles with data-i18n (single key) ────────────────
    feed.querySelectorAll('.bubble[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      el.innerHTML = t(key);
    });

    // ── Composite bubbles (gotIt + catIntro + catSuffix) ─────────────
    feed.querySelectorAll('.bubble[data-i18n-composite]').forEach(el => {
      const type = el.dataset.i18nComposite;
      if (type === 'gotIt+catPrefix') {
        const catKey = el.dataset.i18nCat;
        if (catKey) el.innerHTML = `${t('gotIt')} ${t('catIntro')} ${t('cat_' + catKey)}. ${t('catSuffix')}`;
      }
    });

    // ── FAQ question chips (data-qkey) ─────────────────────────
    feed.querySelectorAll('.chip[data-qkey]').forEach(c => {
      c.innerHTML = esc(t(c.dataset.qkey));
    });

    // ── ESC cards ─────────────────────────────────────────────
    feed.querySelectorAll('.esc-card').forEach(card => {
      const head = card.querySelector('.esc-head');
      const sub  = card.querySelector('.esc-sub');
      const hrs  = card.querySelector('.esc-hrs');
      const openBtn = card.querySelector('.ebtn-p');
      if (head)   head.textContent = t('escHead');
      if (sub)    sub.textContent  = t('escSub');
      if (hrs)    hrs.textContent  = t('escHrs');
      if (openBtn) openBtn.textContent = t('openTicket');
    });

    // ── Transfer / ticket cards ────────────────────────────────
    feed.querySelectorAll('.transfer-card').forEach(card => {
      const title = card.querySelector('.transfer-title');
      const sub   = card.querySelector('.transfer-sub');
      const ticket = card.querySelector('.transfer-ticket');
      if (title && title.dataset.i18nTitle) title.textContent = t(title.dataset.i18nTitle);
      if (sub   && sub.dataset.i18nSub)     sub.textContent   = t(sub.dataset.i18nSub);
      if (ticket && ticket.dataset.i18nTicket) {
        const id = ticket.querySelector('b')?.textContent || '';
        ticket.innerHTML = `${t(ticket.dataset.i18nTicket)}: <b>${id}</b>`;
      }
    });

    // ── Ticket update confirms ─────────────────────────────────
    feed.querySelectorAll('.ticket-update-confirm').forEach(el => {
      const parts = el.textContent.split(' · ');
      const ticketNum = parts[1] || '';
      el.textContent = t('addedToTicket') + (ticketNum ? ' · ' + ticketNum : '');
    });
  });
});

// ─────────────────────────────────────────────────────────────────
// COPY EMAIL
// ─────────────────────────────────────────────────────────────────
function copyEmail(btn) {
  const addr = 'support@backspingames.com';
  const orig = btn.innerHTML;
  const done = () => { btn.innerHTML = t('copied'); setTimeout(() => { btn.innerHTML = orig; }, 2500); };
  if (navigator.clipboard) navigator.clipboard.writeText(addr).then(done).catch(done);
  else {
    const ta = Object.assign(document.createElement('textarea'), { value: addr });
    ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(_) {}
    document.body.removeChild(ta); done();
  }
}

// ─────────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────────
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─────────────────────────────────────────────────────────────────
// DISCORD WEBHOOK  (proxied through backend — URL never exposed to client)
// ─────────────────────────────────────────────────────────────────
async function sendDiscordWebhook(ticketId, type, messages, subject) {
  try {
    await fetch('/api/support/discord-notify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticketId, type, messages, subject })
    });
  } catch (e) {
    console.warn('Discord notify failed:', e);
  }
}

// ─────────────────────────────────────────────────────────────────
// CONVERSATIONS INBOX
// ─────────────────────────────────────────────────────────────────
const INBOX_KEY = 'bsp_conversations';
let conversations = [];

function loadConversations() {
  try {
    conversations = JSON.parse(localStorage.getItem(INBOX_KEY) || '[]');
  } catch (_) { conversations = []; }
}

function saveConversations() {
  try { localStorage.setItem(INBOX_KEY, JSON.stringify(conversations)); } catch (_) {}
}

function saveConversation(id, subject, messages, status) {
  const idx = conversations.findIndex(c => c.id === id);
  const entry = {
    id,
    subject: subject || 'Support Request',
    preview: (messages || []).filter(Boolean).slice(-1)[0] || '',
    messages: messages || [],
    status: status || 'open',
    updatedAt: Date.now()
  };
  if (idx >= 0) { conversations[idx] = entry; }
  else { conversations.unshift(entry); }
  saveConversations();
}

function renderInboxList() {
  const list = document.getElementById('inbox-list');
  if (!list) return;
  if (!conversations.length) {
    list.innerHTML = `<div class="inbox-empty"><div class="inbox-empty-icon">💬</div><div class="inbox-empty-title">No conversations yet</div>Tap the button below to get started.</div>`;
    return;
  }
  const openOnes  = conversations.filter(c => c.status === 'open');
  const closedOnes = conversations.filter(c => c.status !== 'open');
  let html = '';
  if (openOnes.length) {
    html += `<div class="inbox-section-lbl">Open</div>`;
    openOnes.forEach(c => { html += convoCardHTML(c); });
  }
  if (closedOnes.length) {
    html += `<div class="inbox-section-lbl">Closed</div>`;
    closedOnes.forEach(c => { html += convoCardHTML(c); });
  }
  list.innerHTML = html;
}

function convoCardHTML(c) {
  const date = new Date(c.updatedAt).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  const badge = c.status === 'open'
    ? `<span class="convo-badge open">● Open</span>`
    : `<span class="convo-badge closed">Closed</span>`;
  return `<div class="convo-card ${c.status}" onclick="openConversation('${esc(c.id)}')">
    <div class="convo-card-top">
      <span class="convo-card-id">${esc(c.id)}</span>
      <span class="convo-card-date">${date}</span>
    </div>
    <div class="convo-card-subject">${esc(c.subject)}</div>
    <div class="convo-card-preview">${esc(c.preview)}</div>
    ${badge}
  </div>`;
}

const inboxScreen = document.getElementById('inbox-screen');
const chatScreen  = document.getElementById('chat-screen');
const hdrBack     = document.getElementById('hdr-back');

function showInbox() {
  loadConversations();
  renderInboxList();
  inboxScreen.classList.remove('hidden');
  chatScreen.classList.add('hidden');
  if (hdrBack) hdrBack.classList.remove('visible');
}

function showChat() {
  inboxScreen.classList.add('hidden');
  chatScreen.classList.remove('hidden');
  if (hdrBack) hdrBack.classList.add('visible');
}

function startNewConversation() {
  stage = 1; noCount = 0; conversationHistory = []; chatLog = [];
  activeTicketId = null; ticketMessages = [];
  feed.innerHTML = '';
  hideInputBar();
  showChat();
  startGreeting();
}

function openConversation(ticketId) {
  const convo = conversations.find(c => c.id === ticketId);
  if (!convo) { startNewConversation(); return; }
  stage = 2; noCount = 0; conversationHistory = []; chatLog = [];
  activeTicketId = convo.id;
  ticketMessages = [...(convo.messages || [])];
  feed.innerHTML = '';
  showChat();

  // Reconstruct last few messages as display
  const msgs = convo.messages || [];
  if (msgs.length) {
    const preview = msgs.slice(-6);
    preview.forEach((m, i) => {
      if (i % 2 === 0) userBubble(m);
      else botBubble(m);
    });
  }

  const card = document.createElement('div');
  card.className = 'transfer-card';
  card.innerHTML = `<div class="transfer-icon">📋</div>
    <div class="transfer-title">Resumed: ${esc(convo.id)}</div>
    <div class="transfer-sub">${esc(convo.subject)}</div>`;
  feed.appendChild(card);
  scrollBottom();

  botBubble(t('addMoreInfo'), true, 'addMoreInfo');
  enterStage2();
}

// ─────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────
msgInput.placeholder = t('placeholder');
loadConversations();
showInbox();
</script>
